name: Autonomous Upgrade Canary

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  canary-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Canary Evals
        run: mvn test
